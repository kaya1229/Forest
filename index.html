<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강철삼림: 전술 수사망 네트워크</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020508; font-family: 'Courier New', monospace; }
        #ui-layer {
            position: absolute; top: 30px; left: 30px; color: #00ffff;
            text-shadow: 0 0 10px #00ffff; pointer-events: none; z-index: 10;
        }
        #status-log {
            position: absolute; bottom: 30px; left: 30px; color: #00ffff;
            background: rgba(0, 20, 40, 0.7); padding: 20px; border: 1px solid #00ffff;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.2); min-width: 320px;
        }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 255, 0.1); animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scan-line"></div>
<div id="ui-layer">
    <div style="font-size: 1.8em; letter-spacing: 2px;">[ SECTOR SCANNING: ACTIVE ]</div>
    <div style="font-size: 0.9em; opacity: 0.7; margin-top: 5px;">TACTICAL HUD V3.0 | CONNECTION STABLE</div>
</div>

<div id="status-log">
    <div id="msg-title" style="font-weight: bold; font-size: 1.2em; margin-bottom: 5px;">READY FOR ANALYSIS</div>
    <div id="msg-body">좌표를 선택하여 정밀 스캔을 시작하십시오.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020508);
    scene.fog = new THREE.FogExp2(0x020508, 0.05);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 조명 세팅 - 이미지의 차가운 느낌 재현
    const ambientLight = new THREE.AmbientLight(0x00ffff, 0.2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0x00ffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const gridSize = 8;
    const tileSize = 3;
    const tiles = [];
    let collapsingTiles = [];
    let gameOver = false;

    // 데이터 배치 (지뢰찾기 로직)
    const totalTiles = gridSize * gridSize;
    let posArr = Array.from({length: totalTiles}, (_, i) => i);
    const jangPos = posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0];
    const enemyPos = [];
    for(let i=0; i<10; i++) {
        enemyPos.push(posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0]);
    }

    // 바닥 그리드 추가
    const gridHelper = new THREE.GridHelper(gridSize * tileSize, gridSize, 0x00ffff, 0x002222);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // 건물 생성 함수 - <강철삼림> 이미지 스타일 반영
    function createBuilding(h, isSpecial) {
        const group = new THREE.Group();
        const w = 1.2;

        // 본체
        const bodyGeo = new THREE.BoxGeometry(w, h, w);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x050a15, transparent: true, opacity: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        group.add(body);

        // 테두리 네온 (Wireframe)
        const edgeGeo = new THREE.EdgesGeometry(bodyGeo);
        const edgeMat = new THREE.LineBasicMaterial({ color: isSpecial ? 0x00ffff : 0x005577 });
        const edges = new THREE.LineSegments(edgeGeo, edgeMat);
        group.add(edges);

        // 옥상 구조물
        if (h > 2) {
            const roofGeo = new THREE.BoxGeometry(w*0.5, 0.3, w*0.5);
            const roof = new THREE.Mesh(roofGeo, bodyMat);
            roof.position.y = h/2 + 0.15;
            group.add(roof);
        }
        return group;
    }

    for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
            const idx = i * gridSize + j;
            const group = new THREE.Group();
            
            // 타일 바닥
            const floorGeo = new THREE.PlaneGeometry(tileSize - 0.2, tileSize - 0.2);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x001122, side: THREE.DoubleSide });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = Math.PI / 2;
            group.add(floor);

            // 건물 배치
            const h = (idx === jangPos || enemyPos.includes(idx)) ? 3.5 : 1 + Math.random() * 2.5;
            const b = createBuilding(h, (idx === jangPos || enemyPos.includes(idx)));
            b.position.y = h/2;
            group.add(b);

            group.position.set(i * tileSize - (gridSize * tileSize)/2 + tileSize/2, 0, j * tileSize - (gridSize * tileSize)/2 + tileSize/2);
            group.userData = { idx, isJang: (idx === jangPos), isEnemy: enemyPos.includes(idx), revealed: false };
            scene.add(group);
            tiles.push(group);
        }
    }

    camera.position.set(20, 20, 20);

    // 클릭 이벤트
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
        if (gameOver) return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(tiles, true);

        if (hits.length > 0) {
            let obj = hits[0].object;
            while(obj.parent && !tiles.includes(obj)) obj = obj.parent;
            if (obj && !obj.userData.revealed) reveal(obj);
        }
    });

    function getEnemyCount(idx) {
        let count = 0;
        const r = Math.floor(idx / gridSize);
        const c = idx % gridSize;
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue;
                const nr = r + i, nc = c + j;
                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    if (enemyPos.includes(nr * gridSize + nc)) count++;
                }
            }
        }
        return count;
    }

    function reveal(tile) {
        tile.userData.revealed = true;
        const titleEl = document.getElementById('msg-title');
        const bodyEl = document.getElementById('msg-body');

        if (tile.userData.isJang) {
            updateColors(tile, 0x00ff00);
            titleEl.innerText = "AGENT SECURED";
            gameOver = true;
        } else if (tile.userData.isEnemy) {
            titleEl.innerText = "AMBUSH DETECTED";
            bodyEl.innerText = "시스템 오염... 모든 구역 폐쇄 중.";
            gameOver = true;
            tiles.forEach(t => { if(t.userData.isEnemy) { updateColors(t, 0xff0000); collapsingTiles.push(t); }});
        } else {
            const count = getEnemyCount(tile.userData.idx);
            updateColors(tile, 0x00ffff);
            // 홀로그램 숫자 생성 (생략 가능하나 기능 유지)
            bodyEl.innerText = `구역 안전. 인접 위협 수준: ${count}`;
        }
    }

    function updateColors(group, color) {
        group.traverse(child => {
            if (child.material) {
                child.material = child.material.clone();
                if (child instanceof THREE.LineSegments) child.material.color.set(color);
                else {
                    child.material.emissive = new THREE.Color(color);
                    child.material.emissiveIntensity = 0.5;
                }
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (collapsingTiles.length > 0) {
            collapsingTiles.forEach(t => {
                t.children.forEach(c => {
                    if (c.position.y > -10) {
                        c.position.y -= 0.1;
                        c.rotation.z += 0.01;
                    }
                });
            });
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
