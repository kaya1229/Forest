<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강철삼림: 3D 구역 수사 시스템</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050a10; font-family: 'Malgun Gothic', sans-serif; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; color: #00eeff;
            text-shadow: 0 0 8px #00eeff; pointer-events: none; z-index: 10;
        }
        #status-log {
            position: absolute; bottom: 20px; left: 20px; color: #00eeff;
            background: rgba(0, 30, 60, 0.8); padding: 15px; border: 2px solid #00eeff;
            border-radius: 5px; min-width: 300px;
        }
        .instr { font-size: 0.8em; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div style="font-size: 1.5em; border-bottom: 2px solid #00eeff;">[강철삼림: 3D 감시 네트워크]</div>
    <div class="instr">마우스 드래그: 회전 | 휠: 확대/축소</div>
</div>

<div id="status-log">
    <div id="msg-title" style="font-weight: bold;">SYSTEM READY</div>
    <div id="msg-body">구역을 클릭하여 스캔하십시오. (조직원 10명 매복)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let collapsingTiles = []; // 붕괴 애니메이션이 진행될 타일들
    
    const scene = new THREE.Scene();
    // 톤을 조금 더 밝은 네이비 톤으로 조정
    scene.background = new THREE.Color(0x0a1420);
    scene.fog = new THREE.FogExp2(0x0a1420, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 마우스 컨트롤 추가 ---
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; 

    // --- 조명 강화 (조금 더 밝게) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 환경광 강화
    scene.add(ambientLight);
    const hemiLight = new THREE.HemisphereLight(0x00eeff, 0xaa5500, 0.5);
    scene.add(hemiLight);
    const pointLight = new THREE.PointLight(0xffffff, 0.8);
    pointLight.position.set(20, 30, 20);
    scene.add(pointLight);

    const gridSize = 8;
    const tileSize = 2.5;
    const tiles = [];
    let gameOver = false;

    // 데이터 배치
    const totalTiles = gridSize * gridSize;
    let posArr = Array.from({length: totalTiles}, (_, i) => i);
    const jangPos = posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0];
    const enemyPos = [];
    for(let i=0; i<10; i++) {
        enemyPos.push(posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0]);
    }

    // 도시 생성
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
            const idx = i * gridSize + j;
            const group = new THREE.Group();
            
            // 타일 바닥
            const floorGeo = new THREE.BoxGeometry(tileSize - 0.2, 0.3, tileSize - 0.2);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x1a2a3a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            group.add(floor);

            // 건물 오브젝트
            // 건물 오브젝트 생성 루프 내부
if (idx === jangPos || enemyPos.includes(idx) || Math.random() > 0.4) {
    const isSpecial = (idx === jangPos || enemyPos.includes(idx));
    const h = isSpecial ? 4 : 1.5 + Math.random() * 3; // 특수 타일은 더 높게
    const w = 1.2;

    const buildingGroup = new THREE.Group();

    // 1. 건물 본체 (어두운 외벽)
    const bodyGeo = new THREE.BoxGeometry(w, h, w);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    buildingGroup.add(body);

    // 2. 창문 디테일 (Wireframe 레이어를 겹쳐서 창문 느낌 생성)
    const windowGeo = new THREE.BoxGeometry(w + 0.01, h - 0.2, w + 0.01);
    const windowMat = new THREE.MeshPhongMaterial({
        color: isSpecial ? 0x00eeff : 0x445566,
        wireframe: true,
        transparent: true,
        opacity: 0.3
    });
    const windows = new THREE.Mesh(windowGeo, windowMat);
    buildingGroup.add(windows);

    // 3. 옥상 구조물 (작은 박스 추가)
    const roofGeo = new THREE.BoxGeometry(w * 0.6, 0.4, w * 0.6);
    const roofMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = h / 2 + 0.2;
    buildingGroup.add(roof);

    // 4. 네온 안테나 (특수 타일인 경우 강조)
    if (isSpecial) {
        const antGeo = new THREE.CylinderGeometry(0.02, 0.02, 1);
        const antMat = new THREE.MeshBasicMaterial({ color: 0x00eeff });
        const antenna = new THREE.Mesh(antGeo, antMat);
        antenna.position.set(0, h / 2 + 0.5, 0);
        buildingGroup.add(antenna);
    }

    buildingGroup.position.y = h / 2;
    group.add(buildingGroup);
}

            group.position.set(i * tileSize - (gridSize * tileSize)/2, 0, j * tileSize - (gridSize * tileSize)/2);
            group.userData = { idx, isJang: (idx === jangPos), isEnemy: enemyPos.includes(idx), revealed: false };
            scene.add(group);
            tiles.push(group);
        }
    }

    camera.position.set(15, 18, 15);
    controls.update();

    

// 윈도우 mousedown 대신 click 또는 pointerdown 권장
window.addEventListener('click', (event) => {
    if (gameOver) return;

    // 마우스 좌표 정규화
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // scene.children 대신 tiles 배열을 직접 검사하여 정확도 향상
    const hits = raycaster.intersectObjects(tiles, true);

    if (hits.length > 0) {
        let obj = hits[0].object;
        
        // 클릭된 메쉬의 최상위 부모(Group) 찾기
        while(obj.parent && !tiles.includes(obj)) {
            obj = obj.parent;
        }
        
        if (obj && !obj.userData.revealed) {
            reveal(obj);
        }
    }
});

    function getEnemyCount(idx) {
    let count = 0;
    const r = Math.floor(idx / gridSize);
    const c = idx % gridSize;

    for (let i = -1; i <= 1; i++) {
        for (let j = -1; j <= 1; j++) {
            if (i === 0 && j === 0) continue;
            const nr = r + i;
            const nc = c + j;
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                const neighborIdx = nr * gridSize + nc;
                if (enemyPos.includes(neighborIdx)) count++;
            }
        }
    }
    return count;
}
    function createHologramLabel(text, color) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 128;
    canvas.height = 128;

    // 네온 스타일 숫자 그리기
    ctx.font = 'Bold 80px Arial';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    ctx.fillText(text, 64, 90);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    
    sprite.scale.set(2, 2, 1); // 숫자 크기
    return sprite;
}


    function reveal(tile) {
    tile.userData.revealed = true;
    const titleEl = document.getElementById('msg-title');
    const bodyEl = document.getElementById('msg-body');

    if (tile.userData.isJang) {
        changeColor(tile, 0x00ff00);
        titleEl.innerText = "MISSION COMPLETE";
        gameOver = true;
    } else if (tile.userData.isEnemy) {
        // --- 조직원 칸 클릭 시 로직 시작 ---
        titleEl.innerText = "MISSION FAILED";
        bodyEl.innerText = "매복 구역 진입! 모든 은신처가 붕괴됩니다.";
        bodyEl.style.color = "#ff3333";
        gameOver = true;

        // 모든 타일을 순회하며 적이 있는 칸을 찾아 붕괴 리스트에 추가
        tiles.forEach(t => {
            if (t.userData.isEnemy) {
                changeColor(t, 0xff0000); // 붉게 변경
                collapsingTiles.push(t);   // 붕괴 리스트 추가
            }
        });
        // --- 로직 끝 ---
    } else {
        const count = getEnemyCount(tile.userData.idx);
        changeColor(tile, 0x4488ff);
        const label = createHologramLabel(count.toString(), count > 0 ? "#ffcc00" : "#00eeff");
        label.position.set(0, 5, 0); 
        tile.add(label);
    }
}

    function animate() {
    requestAnimationFrame(animate);
    
    // 붕괴 애니메이션 처리
    if (collapsingTiles.length > 0) {
        collapsingTiles.forEach(tile => {
            // 타일 내의 건물 그룹(보통 index 1 이후의 객체들)을 아래로 내림
            tile.children.forEach(child => {
                if (child instanceof THREE.Group || child.geometry instanceof THREE.BoxGeometry) {
                    // 바닥(y=0) 아래로 서서히 가라앉음
                    if (child.position.y > -5) {
                        child.position.y -= 0.05; // 하강 속도
                        child.rotation.x += 0.01; // 기울어짐
                        child.rotation.z += 0.005;
                    }
                }
            });
        });
    }

    controls.update();
    renderer.render(scene, camera);
}

    function changeColor(group, color) {
        group.children.forEach(mesh => {
            if(mesh.material) {
                mesh.material = mesh.material.clone();
                mesh.material.color.set(color);
                mesh.material.emissive.set(color);
                mesh.material.emissiveIntensity = 0.3;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // OrbitControls 업데이트
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
