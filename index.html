<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강철삼림: 3D 구역 수사 시스템</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050a10; font-family: 'Malgun Gothic', sans-serif; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; color: #00eeff;
            text-shadow: 0 0 8px #00eeff; pointer-events: none; z-index: 10;
        }
        #status-log {
            position: absolute; bottom: 20px; left: 20px; color: #00eeff;
            background: rgba(0, 30, 60, 0.8); padding: 15px; border: 2px solid #00eeff;
            border-radius: 5px; min-width: 300px;
        }
        .instr { font-size: 0.8em; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div style="font-size: 1.5em; border-bottom: 2px solid #00eeff;">[강철삼림: 3D 감시 네트워크]</div>
    <div class="instr">마우스 드래그: 회전 | 휠: 확대/축소</div>
</div>

<div id="status-log">
    <div id="msg-title" style="font-weight: bold;">SYSTEM READY</div>
    <div id="msg-body">구역을 클릭하여 스캔하십시오. (조직원 10명 매복)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    // 톤을 조금 더 밝은 네이비 톤으로 조정
    scene.background = new THREE.Color(0x0a1420);
    scene.fog = new THREE.FogExp2(0x0a1420, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 마우스 컨트롤 추가 ---
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; 

    // --- 조명 강화 (조금 더 밝게) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 환경광 강화
    scene.add(ambientLight);
    const hemiLight = new THREE.HemisphereLight(0x00eeff, 0xaa5500, 0.5);
    scene.add(hemiLight);
    const pointLight = new THREE.PointLight(0xffffff, 0.8);
    pointLight.position.set(20, 30, 20);
    scene.add(pointLight);

    const gridSize = 8;
    const tileSize = 2.5;
    const tiles = [];
    let gameOver = false;

    // 데이터 배치
    const totalTiles = gridSize * gridSize;
    let posArr = Array.from({length: totalTiles}, (_, i) => i);
    const jangPos = posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0];
    const enemyPos = [];
    for(let i=0; i<10; i++) {
        enemyPos.push(posArr.splice(Math.floor(Math.random() * posArr.length), 1)[0]);
    }

    // 도시 생성
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
            const idx = i * gridSize + j;
            const group = new THREE.Group();
            
            // 타일 바닥
            const floorGeo = new THREE.BoxGeometry(tileSize - 0.2, 0.3, tileSize - 0.2);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x1a2a3a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            group.add(floor);

            // 건물 오브젝트
            if (idx === jangPos || enemyPos.includes(idx) || Math.random() > 0.4) {
                const h = (idx === jangPos || enemyPos.includes(idx)) ? 2.5 : 1 + Math.random() * 2;
                const bGeo = new THREE.BoxGeometry(1.2, h, 1.2);
                const bMat = new THREE.MeshPhongMaterial({ color: 0x334455 });
                const b = new THREE.Mesh(bGeo, bMat);
                b.position.y = h / 2;
                group.add(b);
            }

            group.position.set(i * tileSize - (gridSize * tileSize)/2, 0, j * tileSize - (gridSize * tileSize)/2);
            group.userData = { idx, isJang: (idx === jangPos), isEnemy: enemyPos.includes(idx), revealed: false };
            scene.add(group);
            tiles.push(group);
        }
    }

    camera.position.set(15, 18, 15);
    controls.update();

    

// 윈도우 mousedown 대신 click 또는 pointerdown 권장
window.addEventListener('click', (event) => {
    if (gameOver) return;

    // 마우스 좌표 정규화
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // scene.children 대신 tiles 배열을 직접 검사하여 정확도 향상
    const hits = raycaster.intersectObjects(tiles, true);

    if (hits.length > 0) {
        let obj = hits[0].object;
        
        // 클릭된 메쉬의 최상위 부모(Group) 찾기
        while(obj.parent && !tiles.includes(obj)) {
            obj = obj.parent;
        }
        
        if (obj && !obj.userData.revealed) {
            reveal(obj);
        }
    }
});



    function reveal(tile) {
        tile.userData.revealed = true;
        const titleEl = document.getElementById('msg-title');
        const bodyEl = document.getElementById('msg-body');

        if (tile.userData.isJang) {
            changeColor(tile, 0x00ff00); // 승리: 초록색
            titleEl.innerText = "MISSION COMPLETE";
            bodyEl.innerText = "장청 요원 확보에 성공했습니다. 즉시 이탈하십시오.";
            bodyEl.style.color = "#00ff00";
            gameOver = true;
        } else if (tile.userData.isEnemy) {
            changeColor(tile, 0xff0000); // 패배: 빨간색
            titleEl.innerText = "MISSION FAILED";
            bodyEl.innerText = "경고: 조직원의 매복에 걸렸습니다. 작전 실패.";
            bodyEl.style.color = "#ff3333";
            gameOver = true;
        } else {
            changeColor(tile, 0x4488ff); // 안전: 밝은 푸른색
            bodyEl.innerText = "구역 안전. 다음 좌표를 탐색하십시오.";
        }
    }

    function changeColor(group, color) {
        group.children.forEach(mesh => {
            if(mesh.material) {
                mesh.material = mesh.material.clone();
                mesh.material.color.set(color);
                mesh.material.emissive.set(color);
                mesh.material.emissiveIntensity = 0.3;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // OrbitControls 업데이트
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
